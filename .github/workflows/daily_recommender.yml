name: Daily Tech Video Recommender

on:
  schedule:
    - cron: "0 12 * * *"    # 5:30 PM IST = 12:00 UTC every day
  workflow_dispatch:          # allows manual run from GitHub UI

# Allow the workflow to write back to the repo (to save history)
permissions:
  contents: write

jobs:
  recommend:
    name: Send Daily Video Recommendation
    runs-on: ubuntu-latest

    steps:

      # 1. Check out the full repo (with history file)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the recommender
      - name: Run recommender
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python recommender.py

      # 5. Commit updated sent_videos.json back to repo
      #    This is what makes "no repeats" work across days
      - name: Save video history to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_videos.json
          git diff --staged --quiet || git commit -m "📼 Update sent_videos history [$(date '+%Y-%m-%d')]"
          git push
