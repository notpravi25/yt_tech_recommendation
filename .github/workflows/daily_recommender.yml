name: Daily Tech Video Recommender

on:
  # ── Scheduled trigger ─────────────────────────────────
  # GitHub Actions uses UTC time.
  # 5:30 PM IST  =  12:00 PM UTC  (IST is UTC + 5:30)
  schedule:
    - cron: "0 12 * * *"    # runs every day at 12:00 UTC = 5:30 PM IST

  # ── Manual trigger (run anytime from GitHub UI) ───────
  workflow_dispatch:

jobs:
  recommend:
    name: Send Daily Video Recommendation
    runs-on: ubuntu-latest         # GitHub's free Linux server

    steps:

      # 1. Check out your repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Run the recommender script
      #    BOT_TOKEN and CHAT_ID come from GitHub Secrets (never exposed)
      - name: Run recommender
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python recommender.py
